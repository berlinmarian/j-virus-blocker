<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tweet Face Filter - Ayarlar</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 24px;
      }
      section {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-top: 8px;
        margin-bottom: 6px;
      }
      input,
      select,
      button {
        font-size: 14px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
        padding: 8px 10px;
      }
      button {
        cursor: pointer;
      }
      ul {
        padding-left: 20px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .status {
        color: #93c5fd;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tweet Face Filter</h1>

      <section>
        <h2>Genel Ayarlar</h2>
        <div class="row">
          <label>
            <input id="enabled" type="checkbox" />
            Uzantı aktif
          </label>
        </div>

        <label for="threshold">Eşleşme Eşiği ($0.30$ daha katı, $0.60$ daha esnek)</label>
        <input id="threshold" type="number" min="0.2" max="0.9" step="0.01" />

        <label for="hideMode">Uygulama şekli</label>
        <select id="hideMode">
          <option value="remove">Tweet'i tamamen kaldır</option>
          <option value="blur">Tweet'i blur yap</option>
        </select>

        <div style="margin-top: 12px">
          <button id="saveSettings">Ayarları Kaydet</button>
        </div>
      </section>

      <section>
        <h2>Hedef Kişi Profili Ekle/Güncelle</h2>
        <p>
          En iyi sonuç için farklı açı, ışık ve mimik içeren 10+ fotoğraf yükle.
        </p>
        <label for="profileName">Profil adı</label>
        <input id="profileName" type="text" placeholder="örn: j" />

        <label for="photos">Fotoğraflar</label>
        <input id="photos" type="file" accept="image/*" multiple />

        <div style="margin-top: 12px" class="row">
          <button id="trainProfile">Profili Eğit (Embed Oluştur)</button>
        </div>
        <p class="status" id="status"></p>
      </section>

      <section>
        <h2>Kayıtlı Profiller</h2>
        <ul id="profiles"></ul>
      </section>
    </main>

    <script type="module" src="./src/options/options.ts"></script>
  </body>
</html>
